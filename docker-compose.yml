services:
  postgres:
    # pgvector/pgvector:pg16 = PostgreSQL 16 + vector 확장 (ADR-009). 명명 볼륨 유지로 데이터 보존.
    image: pgvector/pgvector:pg16
    container_name: dip-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dip}
      POSTGRES_DB: ${POSTGRES_DB:-dip}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # 명명 볼륨 사용(Windows 바인드 마운트 시 data dir 권한 오류 회피)
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dip}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: dip-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-dip-neo4j}
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    container_name: dip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  neo4j_data:
  redis_data:
