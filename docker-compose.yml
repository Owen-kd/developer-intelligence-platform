services:
  postgres:
    # pgvector/pgvector:pg16 = PostgreSQL 16 + vector 확장 (ADR-009). 명명 볼륨 유지로 데이터 보존.
    image: pgvector/pgvector:pg16
    container_name: dip-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dip}
      POSTGRES_DB: ${POSTGRES_DB:-dip}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # 명명 볼륨 사용(Windows 바인드 마운트 시 data dir 권한 오류 회피)
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dip}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: dip-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-dip-neo4j}
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    container_name: dip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── 앱 서비스(24시간 상시) — target-service. 모두 같은 이미지, command 로 역할 선택 ──
  # 공통 환경: 인프라 호스트는 서비스명(postgres/redis). 시크릿(ANTHROPIC/JIRA)은 .env 로 주입.
  api:
    build: .
    container_name: dip-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache   # fastembed 모델 캐시(재다운로드 방지)

  worker:
    build: .
    container_name: dip-worker
    command: ["python", "-m", "apps.worker.run"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: .env
        required: false
    volumes:
      - hf_cache:/root/.cache

  scheduler:
    build: .
    container_name: dip-scheduler
    command: ["python", "-m", "apps.scheduler.run"]  # SCHEDULER_ENABLED=false 면 즉시 종료
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: .env
        required: false
    volumes:
      - hf_cache:/root/.cache

volumes:
  pg_data:
  neo4j_data:
  redis_data:
  hf_cache:
